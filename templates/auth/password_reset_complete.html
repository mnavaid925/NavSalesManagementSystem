{% extends "auth/base_auth.html" %}
{% block title %}Password reset{% endblock %}

{% block auth_content %}
<h2 style="font-size:25px;font-weight:800;margin-bottom:6px">Password reset</h2>
<p class="text-muted" style="margin-bottom:22px">Your password has been updated successfully.</p>

<div class="alert success" style="position:static;margin-bottom:24px;box-shadow:none">
  <i data-lucide="check-circle"></i>
  <span>You can now sign in with your new password.</span>
</div>

<a href="{% url 'accounts:login' %}" class="btn btn-primary btn-block">
  <i data-lucide="log-in"></i> Back to sign in
</a>
{% endblock %}
